name: Supabase Keep-Alive

# 目的：防止 Supabase 免费项目因「闲置满 7 天」被自动暂停。
# 原理：每天定时访问一个会读取数据库的公开接口，制造一次数据库活动，
#       让 Supabase 的闲置计时器不断被重置，从而永远到不了 7 天。
# 触发：每天定时一次 + 支持在 Actions 页面手动运行。

on:
  schedule:
    # cron 用的是 UTC 时间。这里设为每天 UTC 03:17（≈ 北京时间 11:17）。
    # 故意错开整点：GitHub 整点附近负载高、定时任务常被延迟甚至丢弃。
    - cron: '17 3 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a DB-reading endpoint to keep Supabase active
        run: |
          set -u
          URL="https://talengineer.us/api/talent/list"
          # 重试 3 次：单次网络抖动不算失败，连续 3 次失败才报错
          last=""
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i: HTTP $code from $URL"
            last="$code"
            if [ "$code" = "200" ]; then
              echo "✅ Keep-alive OK — 数据库已被访问，闲置计时器已重置"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Keep-alive 失败（最后一次 HTTP $last）——请检查站点或数据库状态"
          exit 1
